<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VaultHound — Scan. Detect. Protect.</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Rajdhani:wght@600;700&family=Inter:wght@300;400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090f;--bg2:#0d1117;--bg3:#161b27;--bg4:#1c2333;
  --border:#1e2d45;--border2:#263348;
  --text:#e6edf3;--text2:#8b949e;--text3:#484f58;
  --critical:#f85149;--high:#f0883e;--medium:#d29922;--low:#3fb950;
  --secret:#bc8cff;--misc:#39d353;
  --accent:#ff6b35;--accent2:#ff8c5a;
}
body{
  font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;overflow-x:hidden;
  background-image:linear-gradient(rgba(255,107,53,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,107,53,.03) 1px,transparent 1px);
  background-size:40px 40px;
}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ── LOADING SCREEN ─────────────────────────────────── */
#loadingScreen{
  position:fixed;inset:0;z-index:9999;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .5s ease;
}
#loadingScreen.fade-out{opacity:0;pointer-events:none}
.load-logo-wrap{display:flex;align-items:center;gap:20px;margin-bottom:32px;animation:loadPop .6s cubic-bezier(.34,1.56,.64,1) both}
@keyframes loadPop{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
/* Logo box on loading — background matches the logo image exactly */
.load-dog-box{
  width:88px;height:88px;border-radius:18px;
  background:#232429;
  border:2px solid rgba(255,107,53,.55);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 40px rgba(255,107,53,.6),0 0 80px rgba(255,107,53,.22);
  animation:dogGlow 2s ease-in-out infinite;flex-shrink:0;
  overflow:hidden;
}
@keyframes dogGlow{0%,100%{box-shadow:0 0 40px rgba(255,107,53,.6),0 0 80px rgba(255,107,53,.22)}50%{box-shadow:0 0 70px rgba(255,107,53,.9),0 0 130px rgba(255,107,53,.38)}}
.load-name-wrap{display:flex;flex-direction:column;gap:5px}
/* IMPACTFUL name — Rajdhani Bold, tight tracking */
.load-name{
  font-family:'Rajdhani',sans-serif;font-weight:700;font-size:52px;
  line-height:1;letter-spacing:-.02em;color:var(--text);white-space:nowrap;
}
.load-name .vh{color:var(--text)}
.load-name .accent{color:var(--accent)}
/* tagline — mono caps, spaced */
.load-tag{
  font-family:'IBM Plex Mono',monospace;font-size:10.5px;
  letter-spacing:.28em;text-transform:uppercase;color:var(--text3);
  padding-left:2px;
}
.load-bar-wrap{width:280px;height:2px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-bottom:12px}
.load-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .3s ease;box-shadow:0 0 10px rgba(255,107,53,.6)}
.load-status{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text3);letter-spacing:.06em;min-height:18px}

/* ── HEADER ─────────────────────────────────────────── */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 2rem;height:56px;
  background:rgba(7,9,15,.97);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;backdrop-filter:blur(14px);
}
/* Logo: SVG icon + Rajdhani name, no gap between Vault and Hound */
.logo{display:flex;align-items:center;gap:11px;text-decoration:none}
.logo-ic{
  width:40px;height:40px;border-radius:10px;
  background:#232429;
  border:1.5px solid rgba(255,107,53,.45);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 14px rgba(255,107,53,.4),0 0 28px rgba(255,107,53,.15);
  flex-shrink:0;overflow:hidden;
}
.logo-text-group{display:flex;flex-direction:column;gap:1px;line-height:1}
.logo-name{
  font-family:'Rajdhani',sans-serif;font-weight:700;font-size:22px;
  letter-spacing:-.01em;color:var(--text);white-space:nowrap;
}
.logo-name .accent{color:var(--accent)}
.logo-tag{
  font-family:'IBM Plex Mono',monospace;font-size:8.5px;
  letter-spacing:.2em;text-transform:uppercase;color:var(--text3);
  padding-left:1px;
}
/* ── HEADER RIGHT ── */
.hdr-r{display:flex;align-items:center;gap:10px}
.last-upd{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3);padding:4px 10px;border-radius:4px;background:var(--bg3);border:1px solid var(--border);white-space:nowrap}
/* EagleEye-style refresh: transparent border button, only glows on active/hover */
.btn-refresh{
  display:flex;align-items:center;gap:7px;
  padding:6px 15px;border-radius:6px;
  background:transparent;
  color:var(--text2);
  border:1.5px solid var(--border2);
  font-size:12px;font-weight:600;cursor:pointer;
  font-family:'IBM Plex Mono',monospace;letter-spacing:.05em;
  transition:all .18s ease;
  position:relative;
}
.btn-refresh:hover:not(:disabled){
  border-color:var(--accent);color:var(--accent);
  background:rgba(255,107,53,.06);
  box-shadow:0 0 16px rgba(255,107,53,.25);
}
.btn-refresh:active:not(:disabled){
  background:rgba(255,107,53,.14);
  box-shadow:0 0 28px rgba(255,107,53,.5);
  transform:scale(.97);
}
.btn-refresh:disabled{opacity:.45;cursor:not-allowed}
/* The spinning circle icon inside button */
.refresh-icon{
  width:14px;height:14px;border-radius:50%;
  border:2px solid currentColor;border-top-color:transparent;
  display:inline-block;flex-shrink:0;
  transition:border-color .18s;
}
.btn-refresh.spinning .refresh-icon{animation:spin .65s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--low);box-shadow:0 0 6px var(--low);animation:pulse 2s infinite;flex-shrink:0}
.live-dot.err{background:var(--critical);box-shadow:0 0 6px var(--critical);animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── TABS ───────────────────────────────────────────── */
.tabs{display:flex;border-bottom:1px solid var(--border);background:rgba(7,9,15,.97);padding:0 2rem;position:sticky;top:56px;z-index:99;backdrop-filter:blur(14px)}
.tab{padding:11px 18px;font-size:12px;font-weight:500;color:var(--text3);border-bottom:2px solid transparent;cursor:pointer;transition:.15s;letter-spacing:.03em;user-select:none}
.tab:hover{color:var(--text2)}.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* MAIN */
main{padding:22px 2rem;max-width:1600px;margin:0 auto;width:100%}

/* STAT CARDS */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:20px}
.stat-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px 18px;
  transition:border-color .2s,box-shadow .2s;position:relative;overflow:hidden;
}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--c,transparent);opacity:.7}
.stat-card:hover{border-color:var(--border2);box-shadow:0 4px 24px rgba(0,0,0,.4)}
.stat-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:10px}
.stat-val{font-family:'IBM Plex Mono',monospace;font-size:28px;font-weight:600;line-height:1;color:var(--c,var(--text))}
.stat-sub{font-size:10px;color:var(--text3);margin-top:5px}

/* PANELS */
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.panel-hdr{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--border)}
.panel-ttl{font-size:12px;font-weight:600;color:var(--text2);display:flex;align-items:center;gap:7px;letter-spacing:.02em}
.panel-body{padding:16px}.panel-body.np{padding:0}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.grid32{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:900px){.grid2,.grid32{grid-template-columns:1fr}}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.b-critical{background:rgba(248,81,73,.15);color:var(--critical);border:1px solid rgba(248,81,73,.3)}
.b-high{background:rgba(240,136,62,.15);color:var(--high);border:1px solid rgba(240,136,62,.3)}
.b-medium{background:rgba(210,153,34,.15);color:var(--medium);border:1px solid rgba(210,153,34,.3)}
.b-low{background:rgba(63,185,80,.15);color:var(--low);border:1px solid rgba(63,185,80,.3)}
.b-image{background:rgba(255,107,53,.12);color:var(--accent);border:1px solid rgba(255,107,53,.25)}
.b-repo{background:rgba(188,140,255,.12);color:var(--secret);border:1px solid rgba(188,140,255,.25)}
.b-fs{background:rgba(57,211,83,.12);color:var(--misc);border:1px solid rgba(57,211,83,.25)}

/* TABLES */
.tbl{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
.tbl th{text-align:left;padding:9px 13px;color:var(--text3);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid var(--border);background:var(--bg3)}
.tbl td{padding:9px 13px;border-bottom:1px solid var(--border);color:var(--text2)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(255,255,255,.02)}
.mono{font-family:'IBM Plex Mono',monospace;font-size:10px}

/* SEV BARS */
.sev-bars{display:flex;flex-direction:column;gap:10px}
.sev-row{display:flex;align-items:center;gap:10px}
.sev-lbl{font-size:10px;color:var(--text3);width:54px;text-align:right;letter-spacing:.03em}
.sev-bg{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.sev-fill{height:100%;border-radius:3px;transition:width .6s ease}
.sev-cnt{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text2);min-width:38px}

/* CHART */
.chart-wrap{position:relative;width:100%;height:210px}

/* AGENTS */
.agent-list{display:flex;flex-direction:column;gap:8px;padding:12px}
.agent-card{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:8px;background:var(--bg3);border:1px solid var(--border)}
.agent-ic{width:34px;height:34px;border-radius:8px;background:rgba(255,107,53,.1);border:1px solid rgba(255,107,53,.2);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.agent-name{font-size:13px;font-weight:600}
.agent-meta{font-size:10px;color:var(--text3);margin-top:2px}
.online-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:var(--low);box-shadow:0 0 5px var(--low);animation:pulse 2s infinite;margin-left:auto}

/* EMPTY / SPINNER */
.empty{text-align:center;padding:44px 20px;color:var(--text3)}
.empty-icon{font-size:34px;margin-bottom:12px}
.empty-title{font-size:14px;color:var(--text2);margin-bottom:6px;font-weight:500}
.sp-wrap{display:flex;align-items:center;justify-content:center;padding:40px}
.sp{width:28px;height:28px;border-radius:50%;border:2px solid var(--border2);border-top-color:var(--accent);animation:spin .7s linear infinite}

/* DETAIL MODAL */
.overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.78);backdrop-filter:blur(5px);display:flex;align-items:center;justify-content:center;padding:20px}
.detail-panel{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;width:100%;max-width:960px;max-height:88vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.65)}
.detail-hdr{padding:15px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap;gap:8px}
.detail-hdr-info{flex:1;min-width:0}
.detail-title{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.detail-meta{font-size:10px;color:var(--text3);margin-top:3px;font-family:'IBM Plex Mono',monospace}
.detail-controls{display:flex;align-items:center;gap:7px;flex-shrink:0;flex-wrap:wrap}
.sel{padding:5px 10px;border-radius:6px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-size:11px;cursor:pointer;font-family:'IBM Plex Mono',monospace;outline:none}
.sel:focus{border-color:var(--accent)}
.btn-pdf{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:6px;background:rgba(255,107,53,.12);border:1px solid rgba(255,107,53,.35);color:var(--accent);font-size:11px;font-weight:700;cursor:pointer;font-family:'IBM Plex Mono',monospace;transition:all .15s;white-space:nowrap}
.btn-pdf:hover:not(:disabled){background:rgba(255,107,53,.22);border-color:var(--accent)}
.btn-pdf:disabled{opacity:.5;cursor:not-allowed}
.btn-close{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:none;color:var(--text3);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:.15s}
.btn-close:hover{color:var(--text);border-color:var(--text3)}
.detail-body{padding:18px;overflow-y:auto;flex:1}

/* Detail inner */
.res-target{font-size:11px;color:var(--text2);margin-bottom:10px;padding:7px 11px;background:var(--bg3);border-radius:5px;font-family:'IBM Plex Mono',monospace;border-left:3px solid var(--accent);display:flex;align-items:center;gap:8px}
.sec-title{font-size:10px;color:var(--text3);margin-bottom:8px;text-transform:uppercase;letter-spacing:.08em;font-weight:600}
.vtbl{width:100%;border-collapse:collapse;font-size:11px}
.vtbl th{text-align:left;padding:7px 10px;color:var(--text3);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);background:var(--bg3)}
.vtbl td{padding:7px 10px;border-bottom:1px solid var(--border);color:var(--text2)}
.vtbl tr:last-child td{border-bottom:none}
.vtbl tr:hover td{background:rgba(255,255,255,.02)}
.sec-card{background:var(--bg3);border:1px solid var(--border);border-left:3px solid var(--secret);border-radius:7px;padding:12px 14px;margin-bottom:8px}
.sec-match{background:rgba(0,0,0,.35);border-radius:4px;padding:7px 10px;margin-top:8px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--medium);overflow-x:auto;white-space:pre;border:1px solid var(--border)}
.line-badge{background:rgba(188,140,255,.15);color:var(--secret);padding:1px 7px;border-radius:3px;font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:700;border:1px solid rgba(188,140,255,.25)}

/* TOAST — bottom-right notifications */
.toast{
  position:fixed;bottom:24px;right:24px;z-index:9999;
  background:var(--bg3);border-radius:8px;padding:11px 18px;
  font-family:'IBM Plex Mono',monospace;font-size:12px;
  box-shadow:0 8px 30px rgba(0,0,0,.6);
  transform:translateY(90px);opacity:0;
  transition:transform .28s cubic-bezier(.34,1.56,.64,1),opacity .28s ease;
  max-width:320px;display:flex;align-items:center;gap:9px;
  border:1px solid var(--border2);
}
.toast.show{transform:translateY(0);opacity:1}
.toast.t-err{border-color:var(--critical);color:var(--critical)}
.toast.t-info{border-color:var(--accent);color:var(--accent)}
.toast.t-ok{border-color:var(--low);color:var(--low)}
</style>
</head>

<script>
// ── LOGO INJECTION ─────────────────────────────────────────────────────────
(function injectLogos(){
  const src = document.getElementById('realLogo')?.src;
  if(!src) return;

  // Loading screen — large, fills the box
  const lb = document.getElementById('loadLogoBox');
  if(lb){
    const img = document.createElement('img');
    img.src = src;
    img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';
    lb.appendChild(img);
  }
  // Header — fills the logo-ic box
  const hb = document.getElementById('headerLogoBox');
  if(hb){
    const img = document.createElement('img');
    img.src = src;
    img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';
    hb.appendChild(img);
  }
})();

// STATE
let dashData=null,allScans=[],trendChart=null,currentScan=null,refreshing=false;
const scanMap={};

// HELPERS
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmtT(iso){if(!iso)return'—';const d=new Date(iso),n=new Date(),s=Math.floor((n-d)/1000);if(s<60)return s+'s ago';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return d.toLocaleDateString()}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

// TOAST — type: 'info'|'ok'|'err'
let _toastTimer=null;
function toast(msg,type='err'){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast t-'+type+' show';
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>t.classList.remove('show'),3500);
}

function tbadge(t){const k=t==='image'?'b-image':t==='repo'?'b-repo':'b-fs';return`<span class="badge ${k}">${t}</span>`}
function sbadge(s){const k=(s||'').toLowerCase();return`<span class="badge b-${k||'low'}">${s||'?'}</span>`}

// LOADING
function setLoad(pct,msg){document.getElementById('loadBar').style.width=pct+'%';if(msg)document.getElementById('loadStatus').textContent=msg}
function hideLoader(){const s=document.getElementById('loadingScreen'),a=document.getElementById('appShell');s.classList.add('fade-out');a.style.visibility='visible';setTimeout(()=>s.style.display='none',500)}

// TABS
function switchTab(name,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');
  ['overview','scans','agents'].forEach(t=>document.getElementById('tab-'+t).style.display=t===name?'':'none');
  if(name==='scans')renderScans(allScans);
  if(name==='agents')renderAgents(dashData?.agents||[]);
}

// FETCH
async function fetchData(loader){
  const dot=document.getElementById('liveDot'),btn=document.getElementById('btnRefresh');
  btn.disabled=true;btn.classList.add('spinning');
  try{
    if(loader)setLoad(30,'Fetching dashboard stats…');
    const [dr,sr]=await Promise.all([fetch('/api/dashboard'),fetch('/api/scans')]);
    if(!dr.ok)throw new Error('Server '+dr.status);
    dashData=await dr.json();
    const sd=await sr.json();
    allScans=sd.scans||[];
    allScans.forEach(s=>scanMap[s.id]=s);
    if(loader)setLoad(90,'Rendering…');
    dot.classList.remove('err');
    document.getElementById('lastUpd').textContent='Updated '+new Date().toLocaleTimeString();
    renderOverview(dashData);renderScans(allScans);renderAgents(dashData.agents||[]);
    if(loader){setLoad(100,'Ready!');await sleep(350);hideLoader()}
    else toast('Data refreshed','ok');
  }catch(e){
    dot.classList.add('err');toast('⚠ Cannot reach master: '+e.message,'err');
    if(loader){setLoad(100,'⚠ Connection failed');await sleep(700);hideLoader();
      document.getElementById('statGrid').innerHTML=`<div style="grid-column:1/-1;padding:40px;text-align:center;color:var(--critical)">⚠ Cannot reach master server<br><span style="font-size:11px;color:var(--text3);margin-top:8px;display:block">Is <code>node master-server/server.js</code> running?</span></div>`;}
  }finally{btn.disabled=false;btn.classList.remove('spinning');refreshing=false}
}

async function manualRefresh(){
  if(refreshing)return;
  refreshing=true;
  toast('↻ Refreshing data…','info');
  await fetchData(false);
}

// OVERVIEW
function renderOverview(data){
  const ov=data.overview||{};
  const cards=[
    {lbl:'Total Scans',val:ov.totalScans||0,c:'var(--accent)',sub:'all time'},
    {lbl:'Active Agents',val:ov.activeAgents||0,c:'var(--accent)',sub:'reporting'},
    {lbl:'Critical',val:ov.totalCritical||0,c:'var(--critical)',sub:'findings'},
    {lbl:'High',val:ov.totalHigh||0,c:'var(--high)',sub:'findings'},
    {lbl:'Medium',val:ov.totalMedium||0,c:'var(--medium)',sub:'findings'},
    {lbl:'Low',val:ov.totalLow||0,c:'var(--low)',sub:'findings'},
    {lbl:'Secrets',val:ov.totalSecrets||0,c:'var(--secret)',sub:'exposed'},
    {lbl:'Misconfigs',val:ov.totalMisconfigs||0,c:'var(--misc)',sub:'found'},
  ];
  document.getElementById('statGrid').innerHTML=cards.map(c=>`<div class="stat-card" style="--c:${c.c}"><div class="stat-lbl">${c.lbl}</div><div class="stat-val">${c.val.toLocaleString()}</div><div class="stat-sub">${c.sub}</div></div>`).join('');

        <td style="text-align:center;color:var(--high);font-family:'IBM Plex Mono',monospace">${a.high}</td>
        <td class="mono" style="white-space:nowrap">${fmtT(a.receivedAt)}</td>
      </tr>`).join('')}</tbody></table></div>`;

  const tgts=data.topTargets||[];
  document.getElementById('topTgts').innerHTML=!tgts.length

}

// DETAIL MODAL
function openDetail(id){
  const s=scanMap[id];if(!s)return;

  document.getElementById('dtMeta').textContent=`${s.scanType} · ${fmtT(s.receivedAt)} · ID: ${s.id}`;

function overlayBg(e){if(e.target===document.getElementById('detailOverlay'))closeDetail()}
function closeDetail(){document.getElementById('detailOverlay').style.display='none';currentScan=null}
function applyFilter(){renderDetail(document.getElementById('sevFilter').value)}

function renderDetail(sf){
  const scan=currentScan;if(!scan)return;
  const results=scan.trivyReport?.Results||[];let html='';
  for(const res of results){
    let vulns=(res.Vulnerabilities||[]),secs=(res.Secrets||[]),miscs=(res.Misconfigurations||[]);
    if(sf){const f=sf.toUpperCase();vulns=vulns.filter(v=>(v.Severity||'').toUpperCase()===f);secs=secs.filter(s=>(s.Severity||'').toUpperCase()===f);miscs=miscs.filter(m=>(m.Severity||'').toUpperCase()===f)}
    if(!vulns.length&&!secs.length&&!miscs.length)continue;
    html+=`<div style="margin-bottom:24px"><div class="res-target">${esc(res.Target||'')} <span style="color:var(--text3);font-size:10px">${res.Type||''}</span></div>`;

    if(vulns.length){
      html+=`<div class="sec-title">Vulnerabilities (${vulns.length}${sf?' · filtered':''})</div><div style="overflow-x:auto;margin-bottom:16px"><table class="vtbl">
        <thead><tr><th>CVE ID</th><th>Package</th><th>Installed</th><th>Fixed In</th><th>Severity</th><th>Title</th></tr></thead>
        <tbody>${vulns.slice(0,300).map(v=>`<tr>
          <td class="mono" style="color:var(--accent);white-space:nowrap">${esc(v.VulnerabilityID||'')}</td>
          <td class="mono" style="white-space:nowrap">${esc(v.PkgName||'')}</td>
          <td class="mono" style="white-space:nowrap">${esc(v.InstalledVersion||'')}</td>
          <td class="mono" style="white-space:nowrap;color:var(--low)">${esc(v.FixedVersion||'—')}</td>
          <td>${sbadge(v.Severity)}</td>
          <td style="font-size:11px;color:var(--text3);max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(v.Title||'')}">${esc(v.Title||'')}</td>
        </tr>`).join('')}${vulns.length>300?`<tr><td colspan="6" style="text-align:center;color:var(--text3);padding:10px">…and ${vulns.length-300} more. Use severity filter.</td></tr>`:''}</tbody></table></div>`;
    }

    if(secs.length){
      html+=`<div class="sec-title">Secrets Detected (${secs.length}${sf?' · filtered':''})</div>`;
      html+=secs.map(s=>{
        const ls=s.StartLine||s.Line||null,le=s.EndLine||ls;
        const lr=ls?(le&&le!==ls?`L${ls}–${le}`:`L${ls}`):null;
        return`<div class="sec-card">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">${sbadge(s.Severity)}<span style="font-size:12px;font-weight:600;color:var(--text)">${esc(s.Title||s.RuleID||'')}</span></div>
            <span class="mono" style="color:var(--text3);white-space:nowrap">${esc(s.RuleID||'')}</span>
          </div>
          <div style="display:flex;align-items:center;gap:18px;flex-wrap:wrap;font-size:11px;color:var(--text3)">
            <span>Category: <span style="color:var(--text2)">${esc(s.Category||'—')}</span></span>
            ${lr?`<span style="display:flex;align-items:center;gap:6px">📍 Line: <span class="line-badge">${lr}</span></span>`:''}
          </div>
          ${s.Match?`<div class="sec-match">${esc(s.Match)}</div>`:''}
        </div>`;
      }).join('')+'<div style="margin-bottom:8px"></div>';
    }

    if(miscs.length){
      html+=`<div class="sec-title">Misconfigurations (${miscs.length}${sf?' · filtered':''})</div><div style="overflow-x:auto;margin-bottom:16px"><table class="vtbl">
        <thead><tr><th>ID</th><th>Type</th><th>Title</th><th>Severity</th><th>Status</th></tr></thead>
        <tbody>${miscs.map(m=>`<tr>
          <td class="mono" style="white-space:nowrap;color:var(--accent)">${esc(m.ID||'')}</td>
          <td style="white-space:nowrap">${esc(m.Type||'—')}</td>
          <td style="max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(m.Title||'')}">${esc(m.Title||'')}</td>
          <td>${sbadge(m.Severity)}</td>
          <td><span class="badge" style="background:rgba(255,255,255,.06);color:var(--text3);border:1px solid var(--border)">${esc(m.Status||'')}</span></td>
        </tr>`).join('')}</tbody></table></div>`;
    }
    html+='</div>';
  }

  if(!html)html=`<div class="empty"><div class="empty-icon">✅</div><div class="empty-title">${sf?'No '+sf+' findings':'No findings'}</div><div>${sf?'Try a different severity filter':'This scan came back clean'}</div></div>`;
  document.getElementById('dtBody').innerHTML=html;
}

// PDF EXPORT — clean white professional report
async function exportPDF(){
  const scan=currentScan;if(!scan)return;
  const btn=document.getElementById('pdfBtn');btn.textContent='⏳ Generating…';btn.disabled=true;
  try{
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const W=doc.internal.pageSize.getWidth(),H=doc.internal.pageSize.getHeight(),m=15;
    let y=m;

        // helper to add page footer and handle page breaks
    const addFooter=()=>{
      const pc=doc.getNumberOfPages();
      for(let i=1;i<=pc;i++){
        doc.setPage(i);
        // thin orange bottom line
        doc.setDrawColor(255,107,53);doc.setLineWidth(.4);doc.line(m,H-10,W-m,H-10);
        doc.setFontSize(6.5);doc.setFont('helvetica','normal');doc.setTextColor(120,120,120);
        doc.text('VaultHound  ·  Scan. Detect. Protect.',m,H-6);
        doc.text(`Page ${i} of ${pc}`,W-m,H-6,{align:'right'});
        doc.setTextColor(180,180,180);
        doc.text('CONFIDENTIAL',W/2,H-6,{align:'center'});
      }
    };
    const chkY=(need)=>{if(y+need>H-18){doc.addPage();y=m+4;}};

    // ═══════════════════════════════════════════════════════════
    // PAGE 1 HEADER
    // ═══════════════════════════════════════════════════════════
    // Orange top stripe
    doc.setFillColor(255,107,53);doc.rect(0,0,W,1.5,'F');
    // Orange left sidebar stripe
    doc.setFillColor(255,107,53);doc.rect(0,0,1.5,H,'F');

    // Product name — flush to left margin, no logo
    doc.setFont('helvetica','bold');doc.setFontSize(22);doc.setTextColor(30,30,30);
    doc.text('Vault',m,17);
    const vw=doc.getTextWidth('Vault');
    doc.setTextColor(255,107,53);
    doc.text('Hound',m+vw,17);
    doc.setFont('helvetica','normal');doc.setFontSize(7.5);doc.setTextColor(120,120,120);
    doc.text('SCAN  ·  DETECT  ·  PROTECT',m,23);

    // Report title (right-aligned)
    doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(255,107,53);
    doc.text('VULNERABILITY SCAN REPORT',W-m,12,{align:'right'});
    doc.setFont('helvetica','normal');doc.setFontSize(7);doc.setTextColor(120,120,120);
    doc.text(new Date().toLocaleString(),W-m,18,{align:'right'});

    // Divider line — below the tallest element (logo is 4+22=26mm)
    doc.setDrawColor(230,230,230);doc.setLineWidth(.4);doc.line(m,32,W-m,32);
    y=38;

    // ── Target info box ──────────────────────────────────────────────────────
    const sm=scan.summary||{};
    // Light grey info card
    doc.setFillColor(248,249,250);doc.roundedRect(m,y,W-m*2,30,2,2,'F');
    doc.setDrawColor(220,220,220);doc.setLineWidth(.3);doc.roundedRect(m,y,W-m*2,30,2,2,'S');
    // Orange left accent bar on info box
    doc.setFillColor(255,107,53);doc.roundedRect(m,y,3,30,1.5,1.5,'F');

    const infoPairs=[
      ['Target', String(scan.target||'—')],
      ['Scan Type', String(scan.scanType||'—').toUpperCase()],
      ['Agent ID', String(scan.agentId||'—').slice(0,40)],
      ['Scanned At', scan.receivedAt?new Date(scan.receivedAt).toLocaleString():'—'],
      ['First Seen', scan.firstSeenAt?new Date(scan.firstSeenAt).toLocaleString():'—'],
    ];
    let iy=y+7;
    infoPairs.forEach(([k,v])=>{
      doc.setFontSize(7);doc.setFont('helvetica','bold');doc.setTextColor(100,100,100);
      doc.text(k+':',m+7,iy);
      doc.setFont('helvetica','normal');doc.setTextColor(30,30,30);
      doc.text(v.slice(0,85),m+34,iy);
      iy+=4.8;
    });
    y+=36;

    // ── Summary counts row ───────────────────────────────────────────────────
    const cnts=[
      {l:'CRITICAL',v:sm.criticalCount||0,  r:220,g:38, b:38 },
      {l:'HIGH',    v:sm.highCount||0,       r:234,g:88, b:12 },
      {l:'MEDIUM',  v:sm.mediumCount||0,     r:202,g:138,b:4  },
      {l:'LOW',     v:sm.lowCount||0,        r:22, g:163,b:74 },
      {l:'SECRETS', v:sm.secretCount||0,     r:147,g:51, b:234},
      {l:'MISCONF', v:sm.misconfigCount||0,  r:16, g:185,b:129},
    ];
    const bw=(W-m*2-cnts.length*2)/cnts.length;
    cnts.forEach((c,i)=>{
      const bx=m+i*(bw+2);
      // White card with coloured top border
      doc.setFillColor(255,255,255);doc.roundedRect(bx,y,bw,16,1.5,1.5,'F');
      doc.setDrawColor(220,220,220);doc.setLineWidth(.25);doc.roundedRect(bx,y,bw,16,1.5,1.5,'S');
      // Coloured top bar
      doc.setFillColor(c.r,c.g,c.b);doc.roundedRect(bx,y,bw,2.5,1,1,'F');
      // Count number
      doc.setFontSize(14);doc.setFont('helvetica','bold');doc.setTextColor(c.r,c.g,c.b);
      doc.text(String(c.v),bx+bw/2,y+10.5,{align:'center'});
      // Label
      doc.setFontSize(5.5);doc.setFont('helvetica','bold');doc.setTextColor(130,130,130);
      doc.text(c.l,bx+bw/2,y+14.5,{align:'center'});
    });
    y+=22;

    // ═══════════════════════════════════════════════════════════
    // SECTIONS — clean white tables, coloured severity text
    // ═══════════════════════════════════════════════════════════
    const results=scan.trivyReport?.Results||[];

    const sevColor=(s)=>{
      const u=(s||'').toUpperCase();
      if(u==='CRITICAL')return[220,38,38];
      if(u==='HIGH')    return[234,88,12];
      if(u==='MEDIUM')  return[202,138,4];
      if(u==='LOW')     return[22,163,74];
      return[100,100,100];
    };

    const addSection=(title,rows,cols,colW)=>{
      if(!rows.length)return;
      chkY(22);
      // Orange accent bar
      doc.setFillColor(255,107,53);doc.rect(m,y,3,7,'F');
      // Section title — bold, 11pt
      doc.setFontSize(11);doc.setFont('helvetica','bold');doc.setTextColor(30,30,30);
      doc.text(title,m+7,y+5.5);
      // Count badge — right aligned, same row, smaller grey text
      const cnt=`${rows.length} finding${rows.length!==1?'s':''}`;
      doc.setFontSize(7);doc.setFont('helvetica','normal');doc.setTextColor(150,150,150);
      doc.text(cnt,W-m,y+5.5,{align:'right'});
      y+=11;

      doc.autoTable({
        startY:y,
        head:[cols],
        body:rows,
        margin:{left:m,right:m},
        styles:{
          fontSize:7,
          cellPadding:2.8,
          overflow:'ellipsize',
          textColor:[50,50,50],
          lineColor:[220,220,220],
          lineWidth:.2,
          fillColor:[255,255,255],
        },
        headStyles:{
          fillColor:[248,249,250],
          textColor:[80,80,80],
          fontStyle:'bold',
          fontSize:6.5,
          lineColor:[210,210,210],
        },
        alternateRowStyles:{fillColor:[252,252,252]},
        columnStyles:Object.fromEntries(colW.map((w,i)=>[i,{cellWidth:w}])),
        didParseCell:(d)=>{
          if(d.section==='body'){
            // colour severity column text
            const raw=String(d.row.raw[d.column.index]||'');
            const sc=sevColor(raw);
            if(['CRITICAL','HIGH','MEDIUM','LOW'].includes(raw.toUpperCase())){
              d.cell.styles.textColor=sc;
              d.cell.styles.fontStyle='bold';
            }
          }
        },
        theme:'grid',
      });
      y=doc.lastAutoTable.finalY+8;
    };

    // Vulnerabilities
    const vrows=[];
    for(const r of results)
      for(const v of r.Vulnerabilities||[])
        vrows.push([v.VulnerabilityID||'',r.Target||'',v.PkgName||'',v.InstalledVersion||'',v.FixedVersion||'—',(v.Severity||'').toUpperCase(),(v.Title||'').slice(0,52)]);
    addSection(`Vulnerabilities`,vrows,['CVE ID','Target','Package','Installed','Fixed In','Severity','Title'],[28,26,22,17,17,15,47]);

    // Secrets
    const srows=[];
    for(const r of results)
      for(const s of r.Secrets||[]){
        const ls=s.StartLine||s.Line||null,le=s.EndLine||ls;
        const lr=ls?(le&&le!==ls?`L${ls}-${le}`:`L${ls}`):'—';
        srows.push([r.Target||'',s.RuleID||'',s.Title||'',s.Category||'—',lr,(s.Severity||'').toUpperCase()]);
      }
    addSection(`Secrets`,srows,['File / Target','Rule ID','Title','Category','Line','Severity'],[38,24,44,22,13,15]);

    // Misconfigurations
    const mrows=[];
    for(const r of results)
      for(const mc of r.Misconfigurations||[])
        mrows.push([mc.ID||'',mc.Type||'—',(mc.Title||'').slice(0,60),(mc.Severity||'').toUpperCase(),mc.Status||'—']);
    addSection(`Misconfigurations`,mrows,['ID','Type','Title','Severity','Status'],[20,26,76,15,18]);

    // No findings at all
    if(!vrows.length&&!srows.length&&!mrows.length){
      chkY(20);
      doc.setFontSize(11);doc.setFont('helvetica','bold');doc.setTextColor(22,163,74);
      doc.text('✓  No findings detected — target is clean.',m,y+8);
    }

    // Footers on all pages
    addFooter();

    const fn=(scan.target||'scan').replace(/[^a-zA-Z0-9._-]/g,'_').slice(0,40);
    doc.save(`VaultHound_${fn}_${Date.now()}.pdf`);
  }catch(e){toast('PDF export failed: '+e.message,'err');console.error(e)}
  finally{document.getElementById('pdfBtn').textContent='⬇ Export PDF';document.getElementById('pdfBtn').disabled=false}
}

// INIT
(async function(){
  setLoad(0,'Starting VaultHound…');
  await sleep(250);
  await fetchData(true);
  setInterval(()=>{if(!refreshing)fetchData(false)},300000); // auto-refresh every 5 min
})();
</script>
